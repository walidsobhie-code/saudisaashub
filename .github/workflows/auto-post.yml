name: Auto-Post to Social Media

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [update-social]

jobs:
  post-to-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Post to Telegram
        run: |
          ARTICLE_TITLE="سوق البرمجيات السحابية في المملكة"
          ARTICLE_SLUG="saas-market-saudi-arabia-2026"
          ARTICLE_EXCERPT="يُتوقع أن يصل حجم سوق SaaS في المملكة إلى 6.49 مليار دولار."
          SITE_URL="https://saudisaashub.pages.dev"
          
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="7293624236"
          
          HOOKS=("وش رايك؟ 🤔" "هل سمعت عن هذا؟ 🤨" "والله تستاهل! 🙌")
          HOOK=${HOOKS[$((RANDOM % 3))]}
          
          MESSAGE="${HOOK}

${ARTICLE_TITLE}

📝 ${ARTICLE_EXCERPT}

👇 ${SITE_URL}/articles/${ARTICLE_SLUG}

#SaudiSaaS #السعودية #التقنية"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
          
          echo "✅ Done!"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
