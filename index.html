<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>سعودي ساس هب | مصدرك الأول لأخبار SaaS في السعودية</title>
  <meta name="description" content="مصدرك الأول لأحدث أخبار وتقارير SaaS والشركات الناشئة في المملكة العربية السعودية. نقدم تحليلات السوق الشاملة، مراجعات الشركات التقنية، وأدلة عملية لنمو مشروعك.">
  <meta name="robots" content="index, follow">

  <!-- PWA: Theme Color -->
  <meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">

  <!-- PWA: Apple Touch Icons & Startup -->
  <link rel="apple-touch-icon" href="/assets/icons/icon-72x72.svg">
  <link rel="apple-touch-icon" sizes="96x96" href="/assets/icons/icon-96x96.svg">
  <link rel="apple-touch-icon" sizes="128x128" href="/assets/icons/icon-128x128.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192x192.svg">
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/icons/icon-512x512.svg">
  <link rel="apple-touch-startup-image" href="/offline.html">

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SaudiSaaSHub">
  <meta name="apple-mobile-web-app-orientation" content="any">

  <!-- PWA: Web App Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Safe Area Insets Variables -->
  <style>
    :root {
      --sat-top: env(safe-area-inset-top, 0px);
      --sat-bottom: env(safe-area-inset-bottom, 0px);
      --sat-left: env(safe-area-inset-left, 0px);
      --sat-right: env(safe-area-inset-right, 0px);
    }
    body {
      padding-top: var(--sat-top);
      padding-bottom: var(--sat-bottom);
      padding-left: var(--sat-left);
      padding-right: var(--sat-right);
    }
  </style>

  <!-- Critical CSS (keep inline for fastest FCP) -->
  <style>
    /* Critical: Above-the-fold styles */
    :root {
      --bg-dark: #0A0A0F;
      --gold: #F5C542;
      --cyan: #00E5FF;
      --text-light: #ffffff;
      --text-muted: #9ca3af;
      --card-bg: rgba(255,255,255,0.05);
      --border-color: rgba(255,255,255,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      font-display: swap;
    }
    @font-face {
      font-family: 'Noto Sans Arabic';
      font-display: swap;
    }
    /* Starfield */
    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    /* Navigation */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.8);
      border-bottom: 1px solid var(--border-color);
      content-visibility: auto;
      contain-intrinsic-size: 70px;
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--text-light); text-decoration: none; }
    .lang-toggle {
      display: flex; gap: 0.5rem;
      background: var(--card-bg);
      padding: 0.25rem;
      border-radius: 20px;
    }
    .lang-btn {
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 16px;
    }
    .lang-btn.active { background: var(--gold); color: var(--bg-dark); }
    /* Hero */
    .hero {
      padding: 8rem 5% 4rem;
      text-align: center;
      position: relative;
      z-index: 1;
      content-visibility: auto;
      contain-intrinsic-size: 600px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--gold), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto 2rem; }
    .search-box {
      max-width: 600px;
      margin: 0 auto 2rem;
      display: flex;
      gap: 0.5rem;
      background: var(--card-bg);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    .search-box input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: none;
      background: transparent;
      color: var(--text-light);
      font-size: 1rem;
      outline: none;
    }
    .search-box button {
      padding: 0.75rem 1.5rem;
      background: var(--gold);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    /* Skeleton Styles */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite linear;
      border-radius: 8px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .skeleton { animation: none; background: rgba(255,255,255,0.05); }
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
    /* Touch-friendly: all interactive elements ≥ 44×44px */
    a, button, [role="button"], input[type="search"], input[type="text"] {
      min-height: 44px;
      min-width: 44px;
    }

    /* Ensure sufficient touch target size with padding */
    .nav-links a {
      min-height: 44px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
    }

    .lang-btn {
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
    }

    .search-box button {
      min-height: 44px;
      min-width: 44px;
    }

    /* Card touch targets */
    .card {
      min-height: 120px; /* Reasonable touch target for cards */
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      content-visibility: auto;
      contain-intrinsic-size: 250px;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(245,197,66,0.2);
    }
    .card h3 { color: var(--gold); margin-bottom: 0.5rem; }
    .card p { color: var(--text-muted); font-size: 0.9rem; }
    /* Companies */
    .company-card img {
      width: 60px; height: 60px;
      border-radius: 12px;
      object-fit: contain;
      background: rgba(255,255,255,0.1);
      padding: 0.5rem;
      margin-bottom: 1rem;
    }
    .company-card img.skeleton {
      width: 60px; height: 60px;
      margin-bottom: 1rem;
      border-radius: 12px;
      padding: 0;
    }
    /* Stats */
    .stats { display: flex; justify-content: center; gap: 4rem; margin: 3rem 0; }
    .stat { text-align: center; }
    .stat-number { display: block; font-size: 2.5rem; color: var(--cyan); font-weight: 700; }
    .stat-label { color: var(--text-muted); }
    /* Footer */
    footer {
      border-top: 1px solid var(--border-color);
      padding: 3rem 5%;
      text-align: center;
      color: var(--text-muted);
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .stats { flex-direction: column; gap: 2rem; }
    }
  </style>

  <!-- Canonical and hreflang -->
  <link rel="canonical" href="https://saudisaashub.com/">
  <link rel="alternate" hreflang="ar" href="https://saudisaashub.com/">
  <link rel="alternate" hreflang="en" href="https://saudisaashub.com/en/">
  <link rel="alternate" hreflang="x-default" href="https://saudisaashub.com/">

  <!-- Prefetch for faster navigation -->
  <link rel="prefetch" href="/companies">
  <link rel="prefetch" href="/categories">
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <nav>
    <div class="logo">سعودي ساس هب</div>
    <ul class="nav-links">
      <li><a href="#categories">التصنيفات</a></li>
      <li><a href="#companies">الشركات</a></li>
      <li><a href="#articles">المقالات</a></li>
      <li><a href="#events">الفعاليات</a></li>
    </ul>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="ar">AR</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </nav>

  <section class="hero">
    <h1>اكتشف أفضل حلول SaaS في السعودية</h1>
    <p>دليلك الشامل للبرمجيات السحابية والشركات الناشئة في المملكة. تصفح، قارن، واختر الأفضل لنمو عملك.</p>

    <div class="search-box">
      <input type="search" placeholder="ابحث عن شركة أو فئة..." id="search" aria-label="البحث عن شركة أو فئة">
      <button type="button" aria-label="بحث">بحث</button>
    </div>

    <!-- Stats with skeleton loading -->
    <div class="stats" id="stats-container">
      <div class="stat">
        <span class="stat-number skeleton" aria-hidden="true"></span>
        <span class="stat-label skeleton" aria-hidden="true"></span>
      </div>
      <div class="stat">
        <span class="stat-number skeleton" aria-hidden="true"></span>
        <span class="stat-label skeleton" aria-hidden="true"></span>
      </div>
      <div class="stat">
        <span class="stat-number skeleton" aria-hidden="true"></span>
        <span class="stat-label skeleton" aria-hidden="true"></span>
      </div>
    </div>
  </section>

  <section id="categories" class="section">
    <h2 class="section-title">تصنيفات SaaS الرئيسية</h2>
    <div class="grid" id="category-grid">
      <!-- Skeleton loaders -->
      <div class="card skeleton" aria-hidden="true"></div>
      <div class="card skeleton" aria-hidden="true"></div>
      <div class="card skeleton" aria-hidden="true"></div>
      <div class="card skeleton" aria-hidden="true"></div>
    </div>
  </section>

  <section id="companies" class="section">
    <h2 class="section-title">أفضل الشركات SaaS</h2>
    <div class="grid" id="featured-grid">
      <!-- Skeleton loaders -->
      <div class="card company-card skeleton" aria-hidden="true">
        <div class="skeleton" style="width: 60px; height: 60px; margin-bottom: 1rem;"></div>
        <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 0.5rem;"></div>
        <div class="skeleton" style="height: 14px; width: 60%;"></div>
      </div>
      <div class="card company-card skeleton" aria-hidden="true">
        <div class="skeleton" style="width: 60px; height: 60px; margin-bottom: 1rem;"></div>
        <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 0.5rem;"></div>
        <div class="skeleton" style="height: 14px; width: 60%;"></div>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 سعودي ساس هب. جميع الحقوق محفوظة.</p>
  </footer>

  <!-- PWA: Service Worker Registration & Install Scripts -->
  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then((registration) => {
            console.log('✅ Service Worker registered: ', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('🔄 New content is available; please refresh.');
                }
              });
            });
          })
          .catch((registrationError) => {
            console.error('❌ Service Worker registration failed: ', registrationError);
          });

        // Initialize install banner
        if (typeof InstallBanner !== 'undefined') {
          InstallBanner.init();
        }
      });
    }
  </script>
  <script src="/pwa/install-banner.js" defer></script>
  <script src="/pwa/install-prompt.js" defer></script>
</body>
</html>
