<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | SaudiSaaSHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #030407;
            color: #F1F5F9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #145E30, #17954D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { font-size: 1.5rem; color: #94A3B8; margin: 1rem 0 2rem; }
        a {
            display: inline-block;
            background: linear-gradient(135deg, #145E30, #17954D);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        a:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(20, 94, 48, 0.4); }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>الصفحة التي تبحث عنها غير موجودة</p>
    <a href="/">العودة للرئيسية</a>
</body>
</html>
