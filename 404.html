<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - صفحة غير موجودة | SaudiSaaSHub</title>
  <meta name="description" content="الصفحة المطلوبة غير موجودة. ابحث عن شركة SaaS أو تصفح دليلنا.">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .error-title {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #F5C542;
    }
    .error-message {
      color: #9ca3af;
      margin-bottom: 2rem;
      max-width: 500px;
    }
    .home-btn {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .home-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">عذراً، الصفحة غير موجودة</h1>
    <p class="error-message">
      لم نتمكن من العثور على الصفحة التي تبحث عنها. 
      هل تريد العودة إلى <a href="/" style="color: #8b5cf6;">الصفحة الرئيسية</a> أو <a href="/categories" style="color: #8b5cf6;">تصفح التصنيفات</a>؟
    </p>
    <a href="/" class="home-btn">العودة إلى الصفحة الرئيسية</a>
  </div>
</body>
</html>
